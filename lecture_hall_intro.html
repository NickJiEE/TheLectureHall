renderCards('all','');

/* ══════════════════════════════════════════════
   INFINITY LOOP — flat-ribbon, curved centreline
   The centre path is a figure-8 (lemniscate) lying
   mostly in the XY plane (the plane facing the camera),
   but its Z coordinate sweeps through one full smooth
   wave over the loop — each lobe glides from "far" to
   "near" through its outer tip, the way a real Möbius
   strip's centreline naturally bows in and out rather
   than sitting flat in a single plane. That same wave is
   what keeps the two passes through the centre crossing
   safely separated (front vs. back) without ever
   touching. The ribbon's cross-section is NOT twisted —
   it stays flat/face-on the whole way round, so the
   curving reads as smooth 3D depth rather than an
   edge-on flip.
   ══════════════════════════════════════════════ */

const canvas3d = document.getElementById('three-canvas');
const renderer = new THREE.WebGLRenderer({canvas:canvas3d,antialias:true,alpha:true});
renderer.setSize(380,240);
renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
renderer.setClearColor(0x000000,0);

const scene = new THREE.Scene();
// Camera sits on +Z looking down -Z — the figure-8 lives in the XY plane,
// so this is a straight-on front view of the infinity symbol.
const camera = new THREE.PerspectiveCamera(36,380/240,0.1,100);
camera.position.set(0,0,9);
camera.lookAt(0,0,0);

// ── centre-line: lemniscate (figure-8) in the XY plane, with depth ──
// x = A*sin(t)            sweeps left ↔ right through both lobes
// y = B*sin(t)*cos(t)     sweeps each lobe up/down (gives the "∞" silhouette)
// z = -DEPTH*cos(t)       ONE smooth wave over the whole loop: each lobe
//     glides from far (-DEPTH) to near (+DEPTH) through its own tip,
//     instead of staying flat. The minus sign puts the t≈π pass (the
//     strand running from the TOP of the left lobe down to the bottom of
//     the right lobe) in front at the crossing, matching the reference.
const A = 3.0, B = 2.4, DEPTH = 1.2;
function centrePoint(t) {
  const x = A * Math.sin(t);
  const y = B * Math.sin(t) * Math.cos(t);
  const z = -DEPTH * Math.cos(t);
  return new THREE.Vector3(x, y, z);
}
function centreTangent(t) {
  const dt = 0.0002;
  const p1 = centrePoint(t - dt);
  const p2 = centrePoint(t + dt);
  return p2.sub(p1).normalize();
}

// ── build the ribbon ──
const U_SEGS  = 900;   // along the path
const V_SEGS  = 40;    // across the width
const HALF_W  = 0.42;  // half-width of the ribbon

const positions = [];
const uvs       = [];
const indices   = [];
const boundaryTop    = []; // v = +HALF_W edge — used for the clean rim outline
const boundaryBottom = []; // v = -HALF_W edge

// Fixed reference axis pointing at the camera. Crossing it with the path's
// tangent gives the ribbon's WIDTH direction lying flat in the screen
// plane (so we see the broad face of the band, not its edge), while the
// remaining perpendicular direction becomes the surface/face normal that
// points roughly toward the camera — exactly what catches light like a
// polished band rather than a flat cut-out.
const VIEW_AXIS = new THREE.Vector3(0,0,1);

for (let i = 0; i <= U_SEGS; i++) {
  const t = (i / U_SEGS) * Math.PI * 2;

  const P    = centrePoint(t);
  const tang = centreTangent(t);

  // No extra twist applied — norm stays exactly as computed, so the
  // ribbon's width direction is always flat in the screen plane and the
  // band never rotates edge-on, even while passing through the crossing.
  let norm = new THREE.Vector3().crossVectors(VIEW_AXIS, tang);
  if (norm.lengthSq() < 1e-6) norm.set(1,0,0); else norm.normalize();

  for (let j = 0; j <= V_SEGS; j++) {
    const v   = (j / V_SEGS - 0.5) * 2 * HALF_W;   // −HALF_W … +HALF_W
    const pos = P.clone().add(norm.clone().multiplyScalar(v));

    positions.push(pos.x, pos.y, pos.z);
    uvs.push(i / U_SEGS, j / V_SEGS);

    if (j === 0)      boundaryBottom.push(pos.x, pos.y, pos.z);
    if (j === V_SEGS) boundaryTop.push(pos.x, pos.y, pos.z);
  }
}

for (let i = 0; i < U_SEGS; i++) {
  for (let j = 0; j < V_SEGS; j++) {
    const a = i*(V_SEGS+1)+j;
    const b = a+1;
    const c = (i+1)*(V_SEGS+1)+j;
    const d = c+1;
    indices.push(a,b,c, b,d,c);
  }
}

const geo = new THREE.BufferGeometry();
geo.setAttribute('position', new THREE.Float32BufferAttribute(positions,3));
geo.setAttribute('uv',       new THREE.Float32BufferAttribute(uvs,2));
geo.setIndex(indices);
geo.computeVertexNormals();

// ── polished gold material ──
// MeshPhysicalMaterial's clearcoat layer + a metalness of 1 is what reads as
// "real metal" rather than plastic — flat MeshPhong specular alone can't do
// that. There's no environment map here, so several differently-tinted
// lights (below) stand in for the varied reflections a true env map would
// give, which is what actually sells the "shining gold" look as it rotates.
const mat = new THREE.MeshPhysicalMaterial({
  color:             0xd9a634,
  metalness:         1.0,
  roughness:         0.3,
  clearcoat:         0.55,
  clearcoatRoughness:0.2,
  reflectivity:      1.0,
  emissive:          0x2b1700,
  emissiveIntensity: 0.35,
  side: THREE.DoubleSide,
});
const mesh = new THREE.Mesh(geo, mat);
scene.add(mesh);

// ── clean gold rim outline along the two true edges of the band ──
// (built straight from the actual boundary vertices, so it always lines
// up perfectly with the surface — no separate/duplicated geometry to drift)
function makeRim(arr) {
  const g = new THREE.BufferGeometry();
  g.setAttribute('position', new THREE.Float32BufferAttribute(arr,3));
  const m = new THREE.LineBasicMaterial({
    color: 0xfff3cf,
    transparent: true,
    opacity: 0.85,
    blending: THREE.AdditiveBlending,
  });
  return new THREE.Line(g,m);
}
const rimTop    = makeRim(boundaryTop);
const rimBottom = makeRim(boundaryBottom);
scene.add(rimTop, rimBottom);

// ── lighting ──
// A hemisphere light (instead of flat ambient) gives a warm-top/dark-bottom
// gradient like a studio backdrop. A cool-tinted light opposite the warm
// key light is what makes gold look like gold rather than yellow plastic —
// real metal picks up contrasting colour casts from its surroundings.
const hemi = new THREE.HemisphereLight(0xfff0c8, 0x1b0f02, 1.1);
const key  = new THREE.DirectionalLight(0xffffff, 3.0);  key.position.set(6,9,8);
const cool = new THREE.DirectionalLight(0xbcd6ff, 1.0);  cool.position.set(-7,2,5);
const rimL = new THREE.DirectionalLight(0xffdf9e, 1.7);  rimL.position.set(-2,-7,-6);
const spec = new THREE.PointLight(0xffffff, 1.4, 60);    spec.position.set(0,1,10);

scene.add(hemi, key, cool, rimL, spec);
scene.add(new THREE.AmbientLight(0x1b0f02, 0.5));

// ── interaction ──
let isDragging=false,lastX=0,lastY=0,velX=0,velY=0,dragEndTime=0;
let rotX=0, rotY=0;   // start flat-on, no tilt
const RESUME_DELAY=1200, AUTO_SPEED=0.0028;

canvas3d.addEventListener('mousedown',e=>{isDragging=true;lastX=e.clientX;lastY=e.clientY;velX=0;velY=0;});
window.addEventListener('mouseup',()=>{if(isDragging){isDragging=false;dragEndTime=performance.now();}});
window.addEventListener('mousemove',e=>{
  if(!isDragging)return;
  velX=(e.clientY-lastY)*0.009; velY=(e.clientX-lastX)*0.009;
  rotX+=velX; rotY+=velY; lastX=e.clientX; lastY=e.clientY;
});
canvas3d.addEventListener('touchstart',e=>{isDragging=true;lastX=e.touches[0].clientX;lastY=e.touches[0].clientY;velX=0;velY=0;},{passive:true});
canvas3d.addEventListener('touchend',()=>{if(isDragging){isDragging=false;dragEndTime=performance.now();}});
canvas3d.addEventListener('touchmove',e=>{
  if(!isDragging)return;
  velX=(e.touches[0].clientY-lastY)*0.009; velY=(e.touches[0].clientX-lastX)*0.009;
  rotX+=velX; rotY+=velY; lastX=e.touches[0].clientX; lastY=e.touches[0].clientY;
},{passive:true});

let animating=true;
const pivot=new THREE.Group();
pivot.add(mesh);
pivot.add(rimTop);
pivot.add(rimBottom);
scene.add(pivot);

function animate(){
  if(!animating)return;
  requestAnimationFrame(animate);
  const now=performance.now(), dt=now-dragEndTime;
  if(isDragging){
    // drag deltas already applied in mousemove
  } else if(dt<RESUME_DELAY){
    velX*=0.91; velY*=0.91; rotX+=velX; rotY+=velY;
  } else {
    const blend=Math.min((dt-RESUME_DELAY)/800,1);
    velX*=0.91; velY*=0.91; rotX+=velX; rotY+=velY+AUTO_SPEED*blend;
  }
  pivot.rotation.x = rotX;
  pivot.rotation.y = rotY;
  renderer.render(scene,camera);
}
animate();

document.getElementById('enter-btn').addEventListener('click',()=>{
  document.getElementById('intro').classList.add('exit');
  document.getElementById('main').classList.add('visible');
  setTimeout(()=>{animating=false;},1200);
});
</script>
