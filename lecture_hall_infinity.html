
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Inter:wght@300;400;500&display=swap');
  * { box-sizing: border-box; margin: 0; padding: 0; }
  #lh-root {
    font-family: 'Inter', sans-serif;
    background: #080c14;
    color: #e2e8f0;
    min-height: 620px;
    position: relative;
    overflow: hidden;
  }
  #intro {
    position: absolute; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    z-index: 10; background: #080c14;
    transition: opacity 0.9s ease, transform 0.9s ease;
  }
  #intro.exit { opacity: 0; transform: scale(1.05); pointer-events: none; }
  #three-canvas { display: block; cursor: grab; }
  #three-canvas:active { cursor: grabbing; }
  .intro-title {
    font-family: 'JetBrains Mono', monospace;
    font-size: 26px; font-weight: 700;
    color: #fff; margin-top: 2px; letter-spacing: -0.5px;
  }
  .intro-title span { color: #f0c060; }
  .intro-sub {
    font-size: 11px; color: #4a3e28;
    margin-top: 8px; letter-spacing: 0.12em;
    text-transform: uppercase; font-family: 'JetBrains Mono', monospace;
  }
  .enter-btn {
    margin-top: 30px; padding: 10px 42px;
    background: transparent;
    border: 1px solid rgba(210,160,50,0.5);
    color: #d4a032; font-family: 'JetBrains Mono', monospace;
    font-size: 12px; font-weight: 500; letter-spacing: 0.12em;
    cursor: pointer; text-transform: uppercase;
    transition: background 0.2s, color 0.2s, border-color 0.2s;
  }
  .enter-btn:hover { background: #d4a032; color: #080c14; border-color: #d4a032; }
  .blink {
    display: inline-block; width: 8px; height: 15px;
    background: #f0c060; margin-left: 3px;
    vertical-align: middle; animation: blink 1s step-end infinite;

  #main {
    position: absolute; inset: 0; overflow-y: auto;
    opacity: 0; pointer-events: none;
    transition: opacity 0.7s ease 0.3s;

    content: ''; position: fixed; inset: 0;

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
const SECTIONS = [
  { name:"Power Electronics", accent:"#f0c060", topics:[
    {title:"Power Factor Visualizer",desc:"Watch voltage, current, and power shift with phase angle.",tags:["viz"]},
    {title:"Beer Glass PF Analogy",desc:"Beer = real power, foam = reactive — intuitive intro to PF.",tags:["viz"]},
    {title:"LLC Operating Modes",desc:"Explore how frequency moves the LLC across operating regions.",tags:["viz"]},
    {title:"Boost Inductor Position",desc:"Why inductor placement in a boost PFC matters for EMI.",tags:["viz"]},
    {title:"Buck Converter",desc:"Duty cycle, switching, and output ripple from first principles.",tags:["theory","sim"]},

    {title:"PID Controller",desc:"Tune Kp, Ki, Kd interactively and watch the step response.",tags:["viz","sim"]},
    {title:"Stability & Root Locus",desc:"Routh-Hurwitz, Nyquist, and root locus from first principles.",tags:["theory"]},
    {title:"Stability Judge",desc:"Is this system stable? Identify from pole-zero plots.",tags:["game"]},

  ]},
  { name:"Analog Design", accent:"#a78bfa", topics:[
    {title:"MOSFET IV Curves",desc:"Sweep Vgs and Vds; explore triode, saturation, and cutoff.",tags:["viz"]},
    {title:"Op-Amp Simulator",desc:"Build inverting, non-inverting, and diff-amp topologies.",tags:["sim"]},
    {title:"Common-Source Amplifier",desc:"Gain, bandwidth, and noise figure — design interactively.",tags:["sim"]},
    {title:"Current Mirror Designer",desc:"Size NMOS/PMOS mirrors with cascode options.",tags:["sim"]},
    {title:"Filter Design",desc:"Butterworth, Chebyshev, Bessel — poles, ripple, group delay.",tags:["theory","sim"]},
    {title:"Analog Design Interview",desc:"OTA, folded cascode, noise — worked IC design problems.",tags:["interview"]},
  ]},

    {title:"Convolution Demo",desc:"Drag two functions; see their convolution computed live.",tags:["viz"]},
    {title:"Laplace Transform",desc:"Key transform pairs, region of convergence, and intuition.",tags:["theory"]},

  ]},

    {title:"SAR ADC",desc:"Bit-by-bit conversion, CDAC charge redistribution, comparator.",tags:["theory","viz"]},

    {title:"RFIC Design",desc:"LNA, mixer, PA specs — P1dB, OIP3, noise figure.",tags:["theory"]},

    {title:"FSM Design",desc:"Moore vs Mealy, state encoding, and timing diagrams.",tags:["theory","viz"]},

    {title:"Pipeline Hazards",desc:"Data, control, and structural hazards — with forwarding paths.",tags:["theory","viz"]},
    {title:"Tomasulo & ROB",desc:"Out-of-order execution, register renaming, and commit.",tags:["theory"]},
    {title:"Branch Prediction",desc:"Bimodal, tournament, and Yeh-Patt predictors compared.",tags:["theory"]},
    {title:"Cache & Memory",desc:"Hit rate, miss penalty, and memory hierarchy tradeoffs.",tags:["theory"]},
  ]},
  { name:"Circuits", accent:"#67e8c8", topics:[
    {title:"Circuit Challenge",desc:"Build a circuit to hit a target spec — interactive construction.",tags:["game"]},
    {title:"Op-Amp Feedback",desc:"Inverting, non-inverting, and stability in feedback systems.",tags:["theory","viz"]},
    {title:"Filter Intuition",desc:"Low-pass, high-pass, band-pass — magnitude and phase response.",tags:["viz"]},
  ]},
  { name:"Interview Prep", accent:"#f9a8d4", topics:[
    {title:"Analog IC Interview",desc:"Folded cascode, OTA, noise, CMRR — full prep.",tags:["interview"]},
    {title:"Power Electronics Interview",desc:"PFC, LLC, motor drive — key concepts and gotchas.",tags:["interview"]},
    {title:"Embedded Systems Interview",desc:"RTOS, interrupts, I2C/SPI, power management.",tags:["interview"]},
    {title:"RTL / Digital Interview",desc:"Verilog coding, CDC, timing, and FPGA constraints.",tags:["interview"]},
  ]},
];

function tagEl(tag) {
  const cls={viz:'tag-viz',sim:'tag-sim',theory:'tag-theory',game:'tag-game',interview:'tag-interview'};
  const lbl={viz:'Viz',sim:'Sim',theory:'Theory',game:'Game',interview:'Interview'};
  return `<span class="card-tag ${cls[tag]}">${lbl[tag]}</span>`;
}
function renderCards(filterTag, searchQ) {
  const container = document.getElementById('cards-container');
  container.innerHTML = '';
  const q = searchQ.toLowerCase();
  SECTIONS.forEach(sec => {
    const matched = sec.topics.filter(t =>
      (filterTag==='all'||t.tags.includes(filterTag)) &&
      (!q||t.title.toLowerCase().includes(q)||t.desc.toLowerCase().includes(q))
    );
    if (!matched.length) return;
    const lbl = document.createElement('div');
    lbl.className = 'section-label';
    lbl.textContent = sec.name;
    container.appendChild(lbl);
    const grid = document.createElement('div');
    grid.className = 'topic-grid';
    matched.forEach(t => {
      const card = document.createElement('div');
      card.className = 'topic-card';
      card.style.setProperty('--accent', sec.accent);
      card.innerHTML = `<div class="card-tag-row">${t.tags.map(tagEl).join('')}</div><div class="card-title">${t.title}</div><div class="card-desc">${t.desc}</div><span class="card-arrow" aria-hidden="true">→</span>`;
      grid.appendChild(card);
    });
    container.appendChild(grid);
  });
  if (!container.children.length) {
    container.innerHTML = '<div style="color:#4a3e28;font-size:13px;padding:2rem 0;font-family:JetBrains Mono,monospace;">No topics found.</div>';
  }
}
let currentFilter='all', currentSearch='';
document.getElementById('filter-bar').addEventListener('click', e => {
  const pill = e.target.closest('.pill');
  if (!pill) return;
  document.querySelectorAll('.pill').forEach(p => p.classList.remove('active'));
  pill.classList.add('active');
  currentFilter = pill.dataset.filter;
  renderCards(currentFilter, currentSearch);
});
document.getElementById('search-input').addEventListener('input', e => {
  currentSearch = e.target.value;
  renderCards(currentFilter, currentSearch);
});
renderCards('all','');

/* ── INFINITY MÖBIUS ── */
const canvas3d = document.getElementById('three-canvas');
const renderer = new THREE.WebGLRenderer({ canvas: canvas3d, antialias: true, alpha: true });
renderer.setSize(320, 240);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setClearColor(0x000000, 0);

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(38, 320/240, 0.1, 100);
camera.position.set(0, 0.4, 7);

function buildInfinityMobius(R, tubeW, tubeH, uSegs, vSegs) {
  const positions = [], normals = [], uvs = [], indices = [];

  for (let i = 0; i <= uSegs; i++) {
    const t = (i / uSegs) * Math.PI * 2;
    const twist = t / 2;

    const denom = 1 + Math.sin(t) * Math.sin(t);
    const cx = (R * Math.cos(t)) / denom;
    const cy = (R * Math.sin(t) * Math.cos(t)) / denom;
    const cz = 0;

    const eps = 0.0001;
    const t2 = t + eps;
    const d2 = 1 + Math.sin(t2)*Math.sin(t2);
    const cx2 = (R*Math.cos(t2))/d2;
    const cy2 = (R*Math.sin(t2)*Math.cos(t2))/d2;

    const tang = new THREE.Vector3(cx2-cx, cy2-cy, 0).normalize();
    const up = new THREE.Vector3(0, 0, 1);
    const norm0 = new THREE.Vector3().crossVectors(tang, up).normalize();
    const binorm = new THREE.Vector3().crossVectors(tang, norm0).normalize();

    const rotNorm = norm0.clone().multiplyScalar(Math.cos(twist))
                    .add(binorm.clone().multiplyScalar(Math.sin(twist)));
    const rotBi   = norm0.clone().multiplyScalar(-Math.sin(twist))
                    .add(binorm.clone().multiplyScalar(Math.cos(twist)));

    for (let j = 0; j <= vSegs; j++) {
      const s = (j / vSegs - 0.5);
      const offN = s * tubeW;
      const px = cx + rotNorm.x * offN;
      const py = cy + rotNorm.y * offN;
      const pz = cz + rotNorm.z * offN;
      positions.push(px, py, pz);

      const n = rotBi.clone().normalize();
      normals.push(n.x, n.y, n.z);
      uvs.push(i / uSegs, j / vSegs);
    }
  }

  for (let i = 0; i < uSegs; i++) {
    for (let j = 0; j < vSegs; j++) {
      const a = i*(vSegs+1)+j;
      const b = a+1;
      const c = (i+1)*(vSegs+1)+j;
      const d = c+1;
      indices.push(a,b,c, b,d,c);
    }
  }

  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
  geo.setAttribute('normal',   new THREE.Float32BufferAttribute(normals, 3));
  geo.setAttribute('uv',       new THREE.Float32BufferAttribute(uvs, 2));
  geo.setIndex(indices);
  geo.computeVertexNormals();
  return geo;
}

const geo = buildInfinityMobius(2.2, 0.55, 0.18, 320, 32);

const mat = new THREE.MeshPhongMaterial({
  color:     0xb8860b,
  emissive:  0x3a2200,
  specular:  0xfff0a0,
  shininess: 160,
  side: THREE.DoubleSide,
});

const mesh = new THREE.Mesh(geo, mat);
mesh.rotation.x = 0.3;
scene.add(mesh);

const rimGeo = buildInfinityMobius(2.2, 0.55, 0.18, 120, 8);
const rimMat = new THREE.LineBasicMaterial({ color: 0xf0c060, transparent: true, opacity: 0.2 });
const rimEdges = new THREE.LineSegments(new THREE.EdgesGeometry(rimGeo), rimMat);
rimEdges.rotation.x = 0.3;
scene.add(rimEdges);

const keyLight = new THREE.DirectionalLight(0xfff5c0, 2.2);
keyLight.position.set(4, 6, 5);
scene.add(keyLight);

const fillLight = new THREE.DirectionalLight(0xd4860a, 1.0);
fillLight.position.set(-5, -2, 3);
scene.add(fillLight);

const rimLight = new THREE.DirectionalLight(0xffffff, 0.8);
rimLight.position.set(0, -6, -4);
scene.add(rimLight);

const ambient = new THREE.AmbientLight(0x1a0e00, 3.0);
scene.add(ambient);

let isDragging = false, lastX = 0, lastY = 0;
let rotX = 0.3, rotY = 0;
let velX = 0, velY = 0;
let dragEndTime = 0;
const RESUME_DELAY = 1200;

canvas3d.addEventListener('mousedown', e => {
  isDragging = true; lastX = e.clientX; lastY = e.clientY;
  velX = 0; velY = 0;
});
window.addEventListener('mouseup', () => {
  if (isDragging) { isDragging = false; dragEndTime = performance.now(); }
});
window.addEventListener('mousemove', e => {
  if (!isDragging) return;
  velX = (e.clientY - lastY) * 0.010;
  velY = (e.clientX - lastX) * 0.010;
  rotX += velX; rotY += velY;
  lastX = e.clientX; lastY = e.clientY;
});
canvas3d.addEventListener('touchstart', e => {
  isDragging = true; lastX = e.touches[0].clientX; lastY = e.touches[0].clientY;
  velX = 0; velY = 0;
}, {passive:true});
canvas3d.addEventListener('touchend', () => {
  if (isDragging) { isDragging = false; dragEndTime = performance.now(); }
});
canvas3d.addEventListener('touchmove', e => {
  if (!isDragging) return;
  velX = (e.touches[0].clientY - lastY) * 0.010;
  velY = (e.touches[0].clientX - lastX) * 0.010;
  rotX += velX; rotY += velY;
  lastX = e.touches[0].clientX; lastY = e.touches[0].clientY;
}, {passive:true});

const AUTO_SPEED = 0.0030;
let animating = true;

function animate() {
  if (!animating) return;
  requestAnimationFrame(animate);

  const now = performance.now();
  const timeSinceDrag = now - dragEndTime;

  if (isDragging) {
    // direct drag — already applied
  } else if (timeSinceDrag < RESUME_DELAY) {
    // coast on momentum, slow it down, no auto yet
    velX *= 0.90;
    velY *= 0.90;
    rotX += velX;
    rotY += velY;
  } else {
    // smoothly blend momentum into auto-rotate
    const blendT = Math.min((timeSinceDrag - RESUME_DELAY) / 800, 1);
    velX *= 0.90;
    velY *= 0.90;
    rotX += velX;
    rotY += velY + AUTO_SPEED * blendT;
  }

  mesh.rotation.x = rotX;
  mesh.rotation.y = rotY;
  rimEdges.rotation.x = rotX;
  rimEdges.rotation.y = rotY;
  renderer.render(scene, camera);
}
animate();

document.getElementById('enter-btn').addEventListener('click', () => {
  document.getElementById('intro').classList.add('exit');
  document.getElementById('main').classList.add('visible');
  setTimeout(() => { animating = false; }, 1200);
});
</script>
